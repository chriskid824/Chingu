name: Automatic App Distribution

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch: # 允許手動觸發

jobs:
  build_and_distribute:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 抓取程式碼 (Checkout)
        uses: actions/checkout@v4
        with:
          fetch-depth: 10  # 取最近 10 筆 commit 用於 release notes

      - name: ☕ 設定 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 設定 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      # ⚡ 快取 Gradle 依賴
      - name: ⚡ 快取 Gradle 依賴
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', 'pubspec.lock') }}
          restore-keys: gradle-

      - name: 📦 下載依賴套件 (Pub get)
        run: flutter pub get

      - name: 🔍 執行靜態分析 (Analyze)
        run: flutter analyze --no-fatal-infos lib/ test/

      - name: 🧪 執行自動化測試 (Test)
        run: flutter test

      # 還原正式 Release Keystore 並建立 key.properties
      - name: 🔑 還原 Release Keystore 與設定
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

          cat <<EOF > android/key.properties
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

          echo "✅ Release keystore 與 key.properties 已成功設定"

      # 驗證所有登入相關設定是否正確
      - name: 🛡️ 驗證 Google/Apple 登入設定
        run: |
          echo "========================================="
          echo "  🛡️ 登入設定檢查報告"
          echo "========================================="
          ERRORS=0

          # 1. SHA-1 指紋驗證
          echo ""
          echo "📌 1. SHA-1 指紋驗證"
          ACTUAL_SHA1=$(keytool -list -v -keystore android/app/upload-keystore.jks -alias "${{ secrets.KEY_ALIAS }}" -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>&1 | grep "SHA1:" | awk '{print $2}')
          EXPECTED_SHA1="${{ secrets.EXPECTED_SHA1 }}"
          if [ "$ACTUAL_SHA1" = "$EXPECTED_SHA1" ]; then
            echo "   ✅ SHA-1 一致"
          else
            echo "   ❌ SHA-1 不一致!"
            ERRORS=$((ERRORS + 1))
          fi

          # 2. google-services.json 存在且格式正確
          echo ""
          echo "📌 2. google-services.json 檢查"
          if [ -f "android/app/google-services.json" ]; then
            PROJECT_ID=$(python3 -c "import json; print(json.load(open('android/app/google-services.json'))['project_info']['project_id'])")
            echo "   ✅ 檔案存在 (project: $PROJECT_ID)"
          else
            echo "   ❌ google-services.json 不存在!"
            ERRORS=$((ERRORS + 1))
          fi

          # 3. firebase_options.dart 檢查
          echo ""
          echo "📌 3. firebase_options.dart 檢查"
          if [ -f "lib/firebase_options.dart" ]; then
            echo "   ✅ Firebase 初始化設定檔存在"
          else
            echo "   ❌ firebase_options.dart 不存在!"
            ERRORS=$((ERRORS + 1))
          fi

          # 4. Auth Service 完整性檢查
          echo ""
          echo "📌 4. Auth Service 登入方法檢查"
          if grep -q "signInWithGoogle" lib/services/auth_service.dart; then
            echo "   ✅ signInWithGoogle 方法存在"
          else
            echo "   ❌ signInWithGoogle 方法遺失!"
            ERRORS=$((ERRORS + 1))
          fi
          if grep -q "signInWithApple" lib/services/auth_service.dart; then
            echo "   ✅ signInWithApple 方法存在"
          else
            echo "   ❌ signInWithApple 方法遺失!"
            ERRORS=$((ERRORS + 1))
          fi

          echo ""
          echo "========================================="
          if [ $ERRORS -gt 0 ]; then
            echo "  ❌ 發現 $ERRORS 個錯誤，中止編譯"
            echo "========================================="
            exit 1
          else
            echo "  ✅ 所有登入設定檢查通過！"
            echo "========================================="
          fi

      # 自動遞增 build number（使用 GitHub run number）
      - name: 🏗️ 編譯 Release APK
        run: flutter build apk --release --build-number=${{ github.run_number }}

      # 上傳 APK 作為 artifact 備份
      - name: 📎 上傳 APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # 產生 release notes
      - name: 📝 產生 Release Notes
        id: release_notes
        run: |
          NOTES=$(git log --oneline -5 --pretty=format:"• %s" | head -c 500)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "Build #${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          EOF

      - name: 🚀 上傳至 Firebase App Distribution
        run: |
          npx firebase-tools appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "$FIREBASE_APP_ID" \
            --testers "chriskid824@gmail.com" \
            --release-notes "${{ steps.release_notes.outputs.notes }}" \
            --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
