name: Automatic App Distribution

on:
  push:
    branches:
      - main
      - release
  workflow_dispatch: # 允許手動觸發

jobs:
  build_and_distribute:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 抓取程式碼 (Checkout)
        uses: actions/checkout@v4
      
      - name: ☕ 設定 Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: 🐦 設定 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true

      # ⚡ 快取 Gradle 依賴，大幅加速第二次之後的編譯
      - name: ⚡ 快取 Gradle 依賴
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            build/
          key: gradle-${{ hashFiles('**/*.gradle*', 'pubspec.lock') }}
          restore-keys: gradle-
          
      - name: 📦 下載依賴套件 (Pub get)
        run: flutter pub get
        
      - name: 🔍 執行靜態分析 (Analyze)
        run: flutter analyze --no-fatal-infos
        
      - name: 🧪 執行自動化測試 (Test)
        run: flutter test
        
      - name: 🏗️ 編譯 Release APK
        run: flutter build apk --release
        
      - name: 🚀 上傳至 Firebase App Distribution
        run: |
          npm install -g firebase-tools
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "$FIREBASE_APP_ID" \
            --testers "chriskid824@gmail.com" \
            --release-notes "由 GitHub Actions 自動發佈的最新建置版本 🚀" \
            --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
